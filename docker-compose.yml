services:

  # ── Banco de dados ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: helpdesk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: helpdesk_sejusc
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - helpdesk_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "3303:3306"
    networks:
      - helpdesk-net

  # ── API Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helpdesk-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/helpdesk_sejusc"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 3333
      CORS_ORIGIN: ${CORS_ORIGIN}
      FEEDBACK_ENABLED: ${FEEDBACK_ENABLED:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - helpdesk-net

  # ── Frontend (nginx + build de produção) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helpdesk-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - helpdesk-net

networks:
  helpdesk-net:
    driver: bridge

volumes:
  helpdesk_mysql_data:
